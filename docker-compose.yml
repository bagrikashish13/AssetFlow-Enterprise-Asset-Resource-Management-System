services:
  db:
    image: postgres:16-alpine
    container_name: assetflow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: assetflow
      POSTGRES_PASSWORD: assetflow_dev
      POSTGRES_DB: assetflow
    ports:
      - '5432:5432'
    volumes:
      - assetflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U assetflow -d assetflow']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  assetflow_pgdata:
